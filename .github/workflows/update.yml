name: Auto Update Fortnite Tournaments (Scraping)

on:
  schedule:
    - cron: '0 3,15 * * *'  # UTC時間の3時と15時（日本時間の12時と24時）
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # Playwright（ブラウザ自動化ツール）をインストール
      - name: Install scraping libraries
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4
          playwright install chromium

      - name: Run Python Scraping Script
        run: python update.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add data.json
          git commit -m "Auto-update tournament data via Playwright" || exit 0
          git push
