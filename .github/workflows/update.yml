name: Auto Update Fortnite Tournaments (Scraping)

on:
  schedule:
    - cron: '0 3 * * *' # 毎日 日本時間の昼12時に実行
  workflow_dispatch: # 手動で動かすためのボタン

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install scraping libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Python Scraping Script
        run: python update.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add data.json
          git commit -m "Auto-update tournament data via scraping" || exit 0
          git push
