<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite 競技大会トラッカー</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-sub: #94a3b8; --accent: #facc15; --live-color: #ef4444; --border-radius: 8px; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        h1 { text-align: center; font-size: 1.8rem; margin-bottom: 20px; }
        .filters { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        select { background-color: var(--card-bg); color: var(--text-main); border: 1px solid #334155; padding: 10px 15px; border-radius: var(--border-radius); font-size: 1rem; cursor: pointer; outline: none; }
        select:hover { border-color: var(--accent); }
        .tournament-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background-color: var(--card-bg); border-radius: var(--border-radius); padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s ease; position: relative; overflow: hidden; border-top: 4px solid #334155; display: flex; flex-direction: column; gap: 10px; }
        .card:hover { transform: translateY(-3px); border-top-color: var(--accent); }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; align-self: flex-start; }
        .status-live { background-color: rgba(239, 68, 68, 0.2); color: var(--live-color); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .status-upcoming { background-color: rgba(148, 163, 184, 0.2); color: var(--text-sub); }
        .tournament-title { font-size: 1.2rem; font-weight: bold; margin: 5px 0; line-height: 1.3; }
        .info-row { font-size: 0.9rem; color: var(--text-sub); display: flex; align-items: center; gap: 8px; }
        .condition-box { background-color: rgba(0, 0, 0, 0.2); padding: 8px; border-radius: 4px; font-size: 0.85rem; color: #cbd5e1; margin-top: 5px; }
        .pr-badge { position: absolute; top: 20px; right: 20px; background-color: var(--accent); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        #message { text-align: center; width: 100%; color: var(--accent); font-size: 1.2rem; }
    </style>
</head>
<body>

    <h1>Fortnite 競技大会トラッカー</h1>

    <div class="filters">
        <select id="pr-filter"><option value="all" selected>すべての大会</option><option value="pr-only">PR大会のみ</option></select>
        <select id="platform-filter"><option value="all" selected>すべての機種</option><option value="pc">PC</option><option value="console">コンソール (PS/Xbox)</option><option value="mobile">モバイル/Switch</option></select>
        <select id="region-filter"><option value="all">全て (All)</option><option value="ASIA" selected>アジア (Asia)</option><option value="NAC">北米中部 (NAC)</option><option value="NAE">北米東部 (NAE)</option><option value="NAW">北米西部 (NAW)</option><option value="EU">ヨーロッパ (EU)</option><option value="OCE">オセアニア (OCE)</option><option value="BR">ブラジル (BR)</option><option value="ME">中東 (ME)</option></select>
    </div>

    <div class="tournament-grid" id="tournament-container">
        <div id="message">自動更新された大会データを読み込み中...</div>
    </div>

    <script>
        const container = document.getElementById('tournament-container');
        let allTournaments = [];

        function formatDateTime(dateString) {
            const date = new Date(dateString);
            return `${date.getMonth() + 1}月${date.getDate()}日 ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        }

        async function loadTournaments() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("データが見つかりません");
                allTournaments = await response.json();
                renderTournaments();
            } catch (error) {
                container.innerHTML = '<p style="text-align:center; color:#ef4444;">データがまだ作成されていないか、取得に失敗しました。<br>GitHub Actionsの実行をお待ちください。</p>';
            }
        }

        function renderTournaments() {
            container.innerHTML = ''; 
            const currentPR = document.getElementById('pr-filter').value;
            const currentPlatform = document.getElementById('platform-filter').value;
            const currentRegion = document.getElementById('region-filter').value;

            // ▼ ここが新しくなった賢いフィルター機能です ▼
            let filtered = allTournaments.filter(t => {
                // PRの判定
                if (currentPR === 'pr-only' && !t.isPR) return false;

                // 🌍 地域の判定（選択した地域 ＋ ALLを表示）
                if (currentRegion !== 'all') {
                    if (t.region !== currentRegion && t.region !== 'ALL') {
                        return false; 
                    }
                }

                // 🎮 機種の判定（選択した機種 ＋ 全機種を表示）
                if (currentPlatform !== 'all') {
                    // もし大会側が「all（全機種）」じゃない場合のみ、機種のチェックをする
                    if (t.platformsStr !== 'all') {
                        if (currentPlatform === 'pc' && !t.platformsStr.includes('pc')) return false;
                        if (currentPlatform === 'console' && !t.platformsStr.includes('xbox') && !t.platformsStr.includes('ps')) return false;
                        if (currentPlatform === 'mobile' && !t.platformsStr.includes('mobile') && !t.platformsStr.includes('switch')) return false;
                    }
                }
                
                return true;
            });

            const now = new Date();
            filtered.forEach(t => {
                t.beginTimeObj = new Date(t.beginTime);
                t.endTimeObj = new Date(t.endTime);
                t.status = (t.beginTimeObj <= now && now <= t.endTimeObj) ? 'live' : 'upcoming';
            });

            // すでに終わった大会は画面から消す
            filtered = filtered.filter(t => t.endTimeObj >= now);

            // ソート（開催中を上に、あとは開催日時が早い順に並べる）
            filtered.sort((a, b) => {
                if (a.status === 'live' && b.status !== 'live') return -1;
                if (a.status !== 'live' && b.status === 'live') return 1;
                return a.beginTimeObj - b.beginTimeObj;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center; width:100%; color:#94a3b8;">該当する予定の大会がありません。</p>';
                return;
            }

            filtered.forEach(t => {
                const card = document.createElement('div');
                card.className = 'card';
                const statusClass = t.status === 'live' ? 'status-live' : 'status-upcoming';
                const statusText = t.status === 'live' ? '🔴 開催中' : '予定';
                card.innerHTML = `
                    ${t.isPR ? '<div class="pr-badge">PR</div>' : ''}
                    <div class="status-badge ${statusClass}">${statusText}</div>
                    <div class="tournament-title">${t.name}</div>
                    <div class="info-row"><span>📅 <strong>開催:</strong> ${formatDateTime(t.beginTime)}</span></div>
                    <div class="info-row"><span>🏁 <strong>終了:</strong> ${formatDateTime(t.endTime)}</span></div>
                    <div class="info-row"><span>🌍 <strong>地域:</strong> ${t.region}</span><span style="margin-left:10px;">🎮 <strong>機種:</strong> ${t.originalPlatforms}</span></div>
                    <div class="condition-box"><strong>📌 条件:</strong><br>${t.condition}</div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('pr-filter').addEventListener('change', renderTournaments);
        document.getElementById('platform-filter').addEventListener('change', renderTournaments);
        document.getElementById('region-filter').addEventListener('change', renderTournaments);

        loadTournaments();
    </script>
</body>
</html>
